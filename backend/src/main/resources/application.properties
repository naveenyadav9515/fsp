# ============================================================
# APPLICATION.PROPERTIES — The App's Configuration File
# ============================================================
#
# WHAT IS THIS FILE?
# This is where you configure your Spring Boot application.
# Spring Boot reads this file AUTOMATICALLY when it starts.
#
# Think of it like a "settings" file for your app.
# You can change the behavior of your app WITHOUT changing any Java code!
#
# ============================================================

# ---- SERVER SETTINGS ----
# The port your backend runs on (default is 8080)
# Your API will be at: http://localhost:8080
server.port=8080

# ---- DATABASE (MongoDB) ----
# MongoDB is a NoSQL database that stores data as JSON-like documents.
# Connection string format: mongodb://host:port/database_name
#
# Make sure MongoDB is running on your machine before starting the app!
# Default MongoDB port is 27017
spring.data.mongodb.uri=mongodb://localhost:27017/taskmanager
# The database name (MongoDB will create it automatically if it doesn't exist)
spring.data.mongodb.database=taskmanager

# ---- LOGGING ----
# Logging levels: TRACE > DEBUG > INFO > WARN > ERROR
# INFO = shows important events (good for development)
logging.level.root=INFO
logging.level.com.enterprise.taskmanager=DEBUG

# This makes the console output colorful and easier to read
spring.output.ansi.enabled=always

# ---- JWT (JSON Web Token) SETTINGS ----
# This is the SECRET KEY used to sign JWT tokens.
# In production, NEVER hardcode this! Use environment variables instead.
# This key must be at least 256 bits (32 characters) for HS256 algorithm.
jwt.secret=MySuperSecretKeyForJWTTokenGeneration2024TaskManager
# Token expiration time in milliseconds (86400000 = 24 hours)
jwt.expiration=86400000

# ---- SPRING SECURITY ----
# Disable the default security login page (we use JWT instead)
spring.security.filter.order=10

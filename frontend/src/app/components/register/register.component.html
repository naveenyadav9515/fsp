<div class="auth-container">
  <div class="auth-card glass-panel">
    <div class="auth-header">
      <h2>Create Account</h2>
      <p>Join us to start organizing your life.</p>
    </div>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="auth-form">
      
      <div class="input-group">
        <label for="username">Choose Username</label>
        <input 
          type="text" 
          id="username" 
          name="username" 
          [(ngModel)]="userData.username" 
          required 
          minlength="3"
          placeholder="e.g. jdoe123"
        />
      </div>

      <div class="input-group">
        <label for="password">Create Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="userData.password" 
          required 
          minlength="6"
          placeholder="••••••••"
        />
      </div>

      <div class="input-group">
        <label for="confirmPassword">Confirm Password</label>
        <input 
          type="password" 
          id="confirmPassword" 
          name="confirmPassword" 
          [(ngModel)]="confirmPassword" 
          required 
          placeholder="••••••••"
        />
      </div>

      <!-- Error State -->
      <div class="message error" *ngIf="errorMessage">
        <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
      </div>

      <!-- Success State -->
      <div class="message success" *ngIf="successMessage">
        <i class="fas fa-check-circle"></i> {{ successMessage }}
      </div>

      <button type="submit" class="btn-primary" [disabled]="isLoading || !registerForm.form.valid">
        <span *ngIf="!isLoading">Create Account</span>
        <span *ngIf="isLoading" class="loader"></span>
      </button>

    </form>

    <div class="auth-footer">
      <p>Already have an account? <a routerLink="/login">Log in here</a></p>
    </div>
  </div>
</div>
